version: "3.9"

# ── Movie and TV Shows Recommending Engine — Optional Services ─────────────────────────────────────────────────
# Run Redis (required for Celery background tasks and optional Redis caching).
#
# Windows / Mac / Linux:
#   docker compose up -d redis
#
# Then start the Celery worker (in a separate terminal):
#   cd backend
#   ..\venv\Scripts\celery -A tasks worker --loglevel=info --pool=solo
#
# Without Docker, the app works fine — it degrades gracefully to FastAPI
# BackgroundTasks and SQLite-based recommendation caching.

services:
  redis:
    image: redis:7-alpine
    container_name: mirai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
    driver: local
